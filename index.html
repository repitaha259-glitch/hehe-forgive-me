<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Will you give me another chance?</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Quicksand', sans-serif;
  color: white;

  background: linear-gradient(-45deg, #ffb6c1, #ff69b4, #6a0dad, #2a1230);
  background-size: 400% 400%;
  animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* moon */
.moon {
  position: absolute;
  top: 40px;
  right: 60px;
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #fff, #ddd);
  box-shadow: 0 0 40px rgba(255,255,255,0.7);
  animation: float 6s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(10px); }
}

/* main box */
.box {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 85%;
  max-width: 500px;

  padding: 25px;
  text-align: center;

  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(12px);
  border-radius: 20px;
}

/* text */
h1 {
  font-size: 22px;
}

#typing {
  min-height: 40px;
  color: #ffe4f2;
}

/* buttons */
button {
  padding: 10px 18px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  margin: 5px;
  font-size: 16px;
}

#yes {
  background: #ffb6c1;
}

#no {
  background: white;
}

/* petals */
.petal {
  position: absolute;
  top: -10px;
  font-size: 18px;
  animation: fall linear forwards;
}

@keyframes fall {
  0% { transform: translateY(-10vh); opacity: 0; }
  10% { opacity: 1; }
  100% { transform: translateY(110vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="moon"></div>

<audio id="bgmusic" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b6b6c1b2.mp3">
</audio>

<audio id="sadSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_2b9f3b8d8a.mp3">
</audio>

<button onclick="document.getElementById('bgmusic').play()">🎵 Play Music</button>

<div class="box">
  <h1>Will you give me another chance? 💔</h1>
  <p id="typing"></p>

  <button id="yes">Yes ❤️</button>
  <button id="no">No 😢</button>

  <h2 id="msg"></h2>
</div>

<script>
/* typing effect */
const text = "I really miss you... will you give me another chance? 💔";
let i = 0;

function type() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text[i++];
    setTimeout(type, 60);
  }
}
type();

/* buttons */
const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const msg = document.getElementById("msg");
const sadSound = document.getElementById("sadSound");

/* YES */
yesBtn.onclick = () => {
  msg.innerHTML = "💖 Thank you... I promise I'll do better this time.";
  yesBtn.style.display = "none";
  noBtn.style.display = "none";
  document.getElementById("typing").style.display = "none";
};

/* NO moving button */
const noTexts = [
  "🥺 please...",
  "💔 think again...",
  "🙏 one chance...",
  "💖 I’ll change..."
];

let n = 0;

noBtn.onclick = () => {
  noBtn.innerText = noTexts[n];
  n = (n + 1) % noTexts.length;

  noBtn.style.position = "absolute";
  noBtn.style.left = Math.random() * 80 + "vw";
  noBtn.style.top = Math.random() * 80 + "vh";

  sadSound.currentTime = 0;
  sadSound.play();
};

/* petals */
setInterval(() => {
  const p = document.createElement("div");
  p.className = "petal";
  p.innerHTML = "🌸";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (4 + Math.random() * 4) + "s";
  document.body.appendChild(p);

  setTimeout(() => p.remove(), 8000);
}, 300);
</script>

</body>
</html>
